<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>건물관리 시스템 기초공사</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        #map { width: 100%; height: 100vh; background-color: #f8f8f8; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f6e6f819368c7675c321c3c13b9d1d28"></script>
    <script>
        var mapContainer = document.getElementById('map'), 
            mapOption = { 
                center: new kakao.maps.LatLng(37.5668, 126.9786), 
                level: 3 
            };

        // 지도를 생성합니다
        var map = new kakao.maps.Map(mapContainer, mapOption);
        console.log("지도 로딩 시도 중...");
    </script>
</body>
</html>
