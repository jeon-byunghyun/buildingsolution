<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>부동산 관리 시스템 - 지도 엔진</title>
    <style>
        /* 화면 전체를 지도로 채우기 */
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f6e6f819368c7675c321c3c13b9d1d28"></script>
    <script>
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786), // 서울 중심 좌표
            level: 3 // 확대 레벨
        };

        // 지도 생성
        var map = new kakao.maps.Map(container, options);
    </script>
</body>
</html>
